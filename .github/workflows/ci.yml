name: CI

# Runs the test suite + i18n parity on every PR to main (and on pushes to main).
# Enable "Require status checks to pass before merging" in branch protection and
# select this "test" job so no red PR can merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Jest + i18n parity
    runs-on: ubuntu-latest
    # Run in a non-UTC zone (before the node process starts) — duration.test.js's
    # round-5 BUG 4 tz-regression tests require it; setting process.env.TZ at
    # runtime isn't reliably picked up by Node, so it must come from the env.
    env:
      TZ: America/Mexico_City
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: EN/ES i18n parity
        run: node scripts/check-i18n-parity.js

      - name: Jest
        run: CI=true npx jest
