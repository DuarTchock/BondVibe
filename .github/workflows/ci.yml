name: CI

# Runs lint + the test suite + i18n parity on every PR to main (and on pushes to
# main). Enable "Require status checks to pass before merging" in branch
# protection and select this "test" job so no red PR can merge.
#
# Lint is here for a reason this codebase learned the hard way: it catches what
# jest can't. A no-undef from a mis-paired import passed jest (the smoke render
# never exercised that path) but the linter flagged it; and an indentation error
# in functions/index.js blocked a deploy at the functions predeploy hook, having
# sailed through a CI that only ran jest. Both linters now gate the PR.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Lint + Jest + i18n parity
    runs-on: ubuntu-latest
    # Run in a non-UTC zone (before the node process starts) — duration.test.js's
    # round-5 BUG 4 tz-regression tests require it; setting process.env.TZ at
    # runtime isn't reliably picked up by Node, so it must come from the env.
    env:
      TZ: America/Mexico_City
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # functions/ is a separate npm package with its own lock — the app's
      # `npm ci` doesn't install it, so the functions linter needs this.
      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: ESLint (app)
        run: npm run lint

      - name: ESLint (functions)
        run: npm --prefix functions run lint

      - name: EN/ES i18n parity
        run: node scripts/check-i18n-parity.js

      - name: Jest
        run: CI=true npx jest

      # ── Security + money suites (Firebase Emulator Suite) ─────────────────────
      # test:rules (firestore + storage security rules) and test:payments (money
      # callables + escrow) were LOCAL-ONLY: a PR could break the rules or the
      # payments/escrow callables and CI would still be green. They gate the PR now.
      - name: Setup Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # firebase-tools 15 REQUIRES JDK 21+ — it rejects 17 outright
          # ("no longer supports Java version before 21"), so the Firestore/Storage
          # emulator won't boot on anything lower.
          java-version: "21"

      # Cache the emulator jars so we don't re-download them every run.
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-fbt15
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-

      - name: Install firebase-tools
        run: npm i -g firebase-tools@15

      - name: Rules tests (firestore + storage security rules)
        run: npm run test:rules

      - name: Payments tests (money callables + escrow, vs emulator)
        run: |
          # Dummy emulator secrets — the payments suite never touches real Stripe
          # (mockStripe + locally-signed webhooks), but the functions emulator needs
          # a non-empty key to construct the Stripe client, and the webhook secret
          # MUST equal the value the tests sign with or signature verification fails.
          cat > functions/.secret.local <<'SECRETS'
          STRIPE_SECRET_KEY=sk_test_ci_dummy
          STRIPE_WEBHOOK_SECRET_PAYMENTS=whsec_dummy_emulator_only
          SECRETS
          npm run test:payments
